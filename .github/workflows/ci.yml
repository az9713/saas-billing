name: CI
# L1 — lint + typecheck + test on every push and PR. The green-check gate.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      # No postinstall hook — the generated Prisma client is needed for typecheck & tests.
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      # ponytail: `next build` skipped — it needs runtime env/DB. Add a build job once you
      # wire CI env vars (DATABASE_URL etc.) as secrets.
