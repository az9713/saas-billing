name: Dependabot auto-merge
# L2 — Galarza loop 1, native. Auto-merge safe (patch/minor) Dependabot PRs once CI is
# green; flag risky (major) bumps for manual review. Needs only GITHUB_TOKEN (no PAT).
# "after CI passes" requires a branch-protection required check on the CI job.
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge patch & minor
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Flag major bumps for manual review
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr edit "$PR_URL" --add-label needs-manual-review
          gh pr comment "$PR_URL" --body \
            "Major version bump (${{ steps.meta.outputs.dependency-names }}) — left for manual review. Check the changelog for breaking changes before merging."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
